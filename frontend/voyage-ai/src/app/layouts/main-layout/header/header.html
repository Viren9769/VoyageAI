<header class="header">

    <!-- ================================ -->
    <!-- Search -->
    <!-- ================================ -->

    <div class="search-box">

        <mat-icon>

            search

        </mat-icon>

        <input
            type="text"
            placeholder="Search destinations, trips, travelers..." />

    </div>

    <!-- ================================ -->
    <!-- Right Actions -->
    <!-- ================================ -->

    <div class="header-actions">

        <button
            mat-icon-button
            class="icon-btn">

            <mat-icon>

                notifications

            </mat-icon>

        </button>

        <button
            mat-icon-button
            class="icon-btn">

            <mat-icon>

                dark_mode

            </mat-icon>

        </button>

        <div class="profile">

            <img
                src="https://i.pravatar.cc/150?img=12"
                alt="Profile">

        </div>

    </div>

</header>
