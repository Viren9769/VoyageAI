<div
    class="travel-details"
    [formGroup]="form">

    <h2>

        Travel Details

    </h2>

    <p class="subtitle">

        Select your travel dates.

    </p>

    <div class="grid">

        <mat-form-field appearance="outline">

            <mat-label>

                Start Date

            </mat-label>

            <input
                matInput
                [matDatepicker]="startPicker"
                formControlName="startDate">

            <mat-datepicker-toggle
                matSuffix
                [for]="startPicker">

            </mat-datepicker-toggle>

            <mat-datepicker
                #startPicker>

            </mat-datepicker>

        </mat-form-field>

        <mat-form-field appearance="outline">

            <mat-label>

                End Date

            </mat-label>

            <input
                matInput
                [matDatepicker]="endPicker"
                formControlName="endDate">

            <mat-datepicker-toggle
                matSuffix
                [for]="endPicker">

            </mat-datepicker-toggle>

            <mat-datepicker
                #endPicker>

            </mat-datepicker>

        </mat-form-field>

    </div>

    <div class="info-card">

        <h3>

            Trip Duration

        </h3>

        <p>

            Duration will be calculated automatically once both dates are selected.

        </p>

    </div>

</div>
