@if (!isLoading && dashboard) {

<div class="dashboard-container">

    <!-- ========================================= -->
    <!-- LEFT SECTION -->
    <!-- ========================================= -->

    <div class="dashboard-left">

        <!-- Welcome -->

        <app-welcome-card
            [welcome]="dashboard.welcome">
        </app-welcome-card>

        <!-- Stats -->

        <app-stats-cards
            [stats]="dashboard.stats">
        </app-stats-cards>

        <!-- AI Planner -->

        <app-ai-planner-card
            [planner]="dashboard.aiPlanner">
        </app-ai-planner-card>

       <div class="dashboard-row">

    <app-travel-map
        class="travel-map-section"
        [travelMap]="dashboard.travelMap">
    </app-travel-map>

    <!-- Expense Overview goes here -->

   
    <app-expense-overview
    [expense]="dashboard.expenseOverview">
</app-expense-overview>
    

</div>
<app-recent-trips
    [trips]="dashboard.recentTrips">
</app-recent-trips>

    </div>

    <!-- ========================================= -->
    <!-- RIGHT SECTION -->
    <!-- ========================================= -->

    <div class="dashboard-right">

        <!-- Traveler Profile -->
         <app-traveler-profile
    [profile]="dashboard.travelerProfile">
</app-traveler-profile>

        <!-- Upcoming Trip -->
             <app-upcoming-trip
        [trip]="dashboard.upcomingTrip">
    </app-upcoming-trip>

        <!-- Weather -->
         <app-weather-card
    [weather]="dashboard.weather">
</app-weather-card>
        <!-- Reminders -->
         <app-reminders
    [reminders]="dashboard.reminders">
</app-reminders>

        



    </div>

</div>

}

@else {

<div class="loading">

    Loading Dashboard...

</div>

}
